# Sünteetiliste andmete näidisprojekt — Airflow + dbt + Superset stack
#
# See projekt on identne struktuuriga ilmaandmete dbt+airflow näitega,
# kuid andmeallikas on genereeritud sünteetiliselt (vt scripts/generate_data.py).
#
# Käivitamine:
#   cp .env.example .env
#   docker compose up -d --build
#   # Airflow: http://localhost:8080  (kasutaja: airflow / parool: airflow)
#   # Superset: http://localhost:8088 (kasutaja: admin / parool: admin)
#   # Käivita Airflow UI-s DAG "myyk_pipeline" käsitsi esimesel korral.

x-airflow-common:
  &airflow-common
  image: apache/airflow:3.1.8
  env_file:
    - .env
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_USER:-airflow}:${AIRFLOW_PASSWORD:-airflow}@airflow-db:5432/${AIRFLOW_DB:-airflow}
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow:8080/execution/'
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW_CONN_ANALYTICS_DB: postgresql://${POSTGRES_USER:-praktikum}:${POSTGRES_PASSWORD:-praktikum}@analytics-db:5432/${POSTGRES_DB:-praktikum}
    POSTGRES_HOST: analytics-db
    POSTGRES_PORT: "5432"
    POSTGRES_USER: ${POSTGRES_USER:-praktikum}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-praktikum}
    POSTGRES_DB: ${POSTGRES_DB:-praktikum}
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-dbt-postgres==1.10.0 numpy==2.2.0}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    - ./dbt_project:/opt/airflow/dbt_project
    - ./scripts:/opt/airflow/scripts
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    airflow-db:
      condition: service_healthy
    analytics-db:
      condition: service_healthy

services:

  analytics-db:
    image: pgduckdb/pgduckdb:18-v1.1.1
    container_name: synteetilised-analytics-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-praktikum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-praktikum}
      POSTGRES_DB: ${POSTGRES_DB:-praktikum}
    ports:
      - "${DB_PORT_HOST:-55433}:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d
      - analytics-db-volume:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-praktikum}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-db:
    image: postgres:16
    container_name: synteetilised-airflow-db
    environment:
      POSTGRES_USER: ${AIRFLOW_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_DB:-airflow}
    volumes:
      - airflow-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AIRFLOW_USER:-airflow}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-init:
    <<: *airflow-common
    container_name: synteetilised-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/{logs,dags}
        /entrypoint airflow version
        /entrypoint airflow config list >/dev/null
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"
    restart: "no"

  airflow:
    <<: *airflow-common
    container_name: synteetilised-airflow
    command: standalone
    ports:
      - "${AIRFLOW_PORT_HOST:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  superset-db:
    image: postgres:16
    container_name: synteetilised-superset-db
    environment:
      POSTGRES_USER: ${SUPERSET_DB_USER:-superset}
      POSTGRES_PASSWORD: ${SUPERSET_DB_PASSWORD:-superset}
      POSTGRES_DB: ${SUPERSET_DB_NAME:-superset}
    volumes:
      - superset-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${SUPERSET_DB_USER:-superset}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  superset:
    image: apache/superset:4.1.1
    container_name: synteetilised-superset
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-supersetsecretkey123}
      SUPERSET_DB_USER: ${SUPERSET_DB_USER:-superset}
      SUPERSET_DB_PASSWORD: ${SUPERSET_DB_PASSWORD:-superset}
      SUPERSET_DB_HOST: superset-db
      SUPERSET_DB_NAME: ${SUPERSET_DB_NAME:-superset}
      ANALYTICS_DB_URI: postgresql+psycopg2://${POSTGRES_USER:-praktikum}:${POSTGRES_PASSWORD:-praktikum}@analytics-db:5432/${POSTGRES_DB:-praktikum}
    depends_on:
      superset-db:
        condition: service_healthy
      analytics-db:
        condition: service_healthy
    ports:
      - "${SUPERSET_PORT_HOST:-8088}:8088"
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py
      - ./superset/dashboards:/app/dashboards
    command:
      - bash
      - -c
      - |
        pip install psycopg2-binary --quiet --no-cache-dir
        superset db upgrade
        superset fab create-admin \
          --username admin \
          --firstname Admin \
          --lastname Admin \
          --email admin@localhost \
          --password admin 2>/dev/null || true
        superset init
        gunicorn \
          --bind '0.0.0.0:8088' \
          --workers 2 \
          --timeout 120 \
          --limit-request-line 0 \
          'superset.app:create_app()'
    restart: always

volumes:
  analytics-db-volume:
  airflow-db-volume:
  airflow-logs:
  superset-db-volume:
